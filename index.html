<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: var(--color-background-primary);
  --bg2: var(--color-background-secondary);
  --bg3: var(--color-background-tertiary);
  --text1: var(--color-text-primary);
  --text2: var(--color-text-secondary);
  --text3: var(--color-text-tertiary);
  --border: var(--color-border-tertiary);
  --border2: var(--color-border-secondary);
  --radius: var(--border-radius-md);
  --radius-lg: var(--border-radius-lg);
  --accent: #D85A30;
  --accent-light: #FAECE7;
  --accent-text: #993C1D;
  --transit: #378ADD;
  --transit-light: #E6F1FB;
  --walk: #1D9E75;
  --walk-light: #E1F5EE;
}

body { font-family: 'Noto Sans KR', sans-serif; color: var(--text1); background: transparent; font-size: 14px; line-height: 1.6; }

.app { display: flex; flex-direction: column; height: 700px; overflow: hidden; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
.header-logo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text1); }
.header-logo span { color: var(--accent); }
.header-steps { display: flex; gap: 6px; align-items: center; }
.step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: background 0.2s; }
.step-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }

/* SCREENS */
.screen { display: none; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* ===== SCREEN 1: CONDITIONS ===== */
.conditions-screen { flex-direction: column; overflow-y: auto; }
.conditions-inner { padding: 24px 20px; max-width: 560px; margin: 0 auto; width: 100%; }
.section-title { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.section-gap { margin-bottom: 22px; }

.chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text1); cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.selected { background: var(--accent); border-color: var(--accent); color: white; }

.days-row { display: flex; align-items: center; gap: 12px; }
.days-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; font-size: 16px; color: var(--text1); display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
.days-btn:hover { border-color: var(--accent); color: var(--accent); }
.days-val { font-size: 18px; font-weight: 500; min-width: 40px; text-align: center; }

.cta-btn { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: var(--radius-lg); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 8px; transition: opacity 0.15s; }
.cta-btn:hover { opacity: 0.88; }

/* ===== SCREEN 2: PLANNER ===== */
.planner-screen { flex-direction: row; }

/* LEFT PANEL */
.left-panel { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 0.5px solid var(--border); }
.panel-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.panel-header h2 { font-size: 13px; font-weight: 500; }
.panel-header p { font-size: 11px; color: var(--text2); margin-top: 2px; }

.summary-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.summary-cell { background: var(--bg2); border-radius: var(--radius); padding: 7px 8px; text-align: center; }
.summary-cell .sv { font-size: 13px; font-weight: 500; }
.summary-cell .sl { font-size: 10px; color: var(--text2); margin-top: 1px; }

.route-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.route-item { padding: 8px 16px; cursor: pointer; transition: background 0.12s; }
.route-item:hover { background: var(--bg2); }
.route-item.active { background: var(--accent-light); }
.ri-row { display: flex; align-items: center; gap: 10px; }
.ri-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ri-info { flex: 1; min-width: 0; }
.ri-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-cat { font-size: 11px; color: var(--text2); }
.ri-time { font-size: 11px; color: var(--text2); text-align: right; flex-shrink: 0; }

.segment-row { display: flex; align-items: center; gap: 8px; padding: 4px 16px 4px 28px; }
.seg-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.seg-badge.transit { background: var(--transit-light); color: var(--transit); }
.seg-badge.walk { background: var(--walk-light); color: var(--walk); }
.seg-text { display:flex; flex-direction:column; gap:2px; font-size: 11px; color: var(--text2); line-height:1.35; }
.seg-subtext { font-size:10px; color: var(--text3); }

/* ADD PLACE */
.add-panel { border-top: 0.5px solid var(--border); flex-shrink: 0; padding: 10px 16px; }
.search-row { display: flex; gap: 6px; }
.search-input { flex: 1; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text1); font-size: 12px; font-family: inherit; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-btn { padding: 7px 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 12px; cursor: pointer; font-family: inherit; white-space: nowrap; }

.search-results { margin-top: 8px; display: none; }
.search-results.open { display: block; }
.result-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.result-item:last-child { border-bottom: none; }
.result-item:hover .ri-name { color: var(--accent); }
.result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.result-dot.restaurant { background: var(--accent); }
.result-dot.cafe { background: #BA7517; }
.result-dot.shopping { background: var(--transit); }
.result-dot.hotel { background: #7B5EA7; }
.result-dot.sightseeing { background: var(--walk); }

/* RIGHT MAP */
.map-area { flex: 1; position: relative; overflow: hidden; }
#leafletMap { width: 100%; height: 100%; }

/* DIFF CARD */
.diff-card { position: absolute; bottom: 12px; left: 12px; right: 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.diff-card.show { display: block; }
.diff-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
.diff-row { display: flex; gap: 16px; }
.diff-item { flex: 1; }
.diff-label { font-size: 10px; color: var(--text3); }
.diff-vals { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
.diff-arrow { color: var(--accent); font-size: 11px; }
.diff-after { color: var(--accent); }
.diff-close { position: absolute; top: 10px; right: 12px; background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text2); font-family: inherit; }

/* DAY TABS */
.day-tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); flex-shrink: 0; overflow-x: auto; }
.day-tab { padding: 8px 14px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; font-family: inherit; background: none; border-top: none; border-left: none; border-right: none; }
.day-tab:hover { color: var(--accent); }
.day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ===== TRANSITIONS ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.route-item, .result-item { animation: fadeIn 0.2s ease; }
.route-item.drag-over { border-top: 2px solid var(--accent); background: var(--accent-light); }
.drag-handle { touch-action: none; user-select: none; -webkit-user-select: none; }
.mobile-move-controls { display: none; align-items: center; gap: 4px; flex-shrink: 0; }
.mobile-move-btn { width: 24px; height: 24px; border-radius: 999px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-family: inherit; }
.mobile-move-btn:disabled { opacity: 0.35; cursor: default; }

/* ===== MOBILE ===== */
@media (max-width: 640px) {
  .app { height: 100dvh; height: -webkit-fill-available; }

  /* 조건 화면 */
  .conditions-inner { padding: 18px 16px; }
  .section-gap { margin-bottom: 18px; }
  .chip { font-size: 13px; padding: 7px 14px; }
  .cta-btn { padding: 15px; font-size: 15px; }

  /* 플래너 화면: 세로 레이아웃 */
  .planner-screen { flex-direction: column !important; }

  /* 좌측 패널 → 하단 드로어 */
  .left-panel {
    width: 100% !important;
    border-right: none !important;
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
    max-height: 52vh;
    order: 2;
  }

  /* 지도 → 상단 */
  .map-area {
    order: 1;
    flex: none;
    height: 48vh;
    width: 100%;
  }
  #leafletMap { height: 100%; }

  /* 패널 헤더 더 컴팩트 */
  .panel-header { padding: 10px 14px 8px; }
  .panel-header h2 { font-size: 13px; }

  /* summary strip */
  .summary-strip { padding: 8px 14px; gap: 6px; }
  .summary-cell { padding: 6px 4px; }
  .summary-cell .sv { font-size: 12px; }

  /* route list 스크롤 */
  .route-list { flex: 1; min-height: 0; }

  /* 검색 패널 */
  .add-panel { padding: 8px 14px; }
  .search-input { font-size: 14px; padding: 9px 10px; }
  .search-btn { padding: 9px 14px; font-size: 13px; }

  /* diff card */
  .diff-card { bottom: auto; top: 8px; left: 8px; right: 8px; }

  /* 탭 스크롤 */
  .day-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .day-tab { padding: 9px 16px; font-size: 13px; }
  .mobile-move-controls { display: inline-flex; }
  .drag-handle { display: none !important; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-logo">tokyo<span>.</span>trip</div>
    <div class="header-steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>
  </div>

  <!-- SCREEN 1: CONDITIONS -->
  <div class="screen active conditions-screen" id="screen1">
    <div class="conditions-inner">
      <div class="section-gap">
        <div class="section-title">출발지 · 목적지</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;" id="countryChips"></div>
        <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;" id="originAirportChips"></div>
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;" id="cityChips"></div>
        <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;" id="destCityChips"></div>
      </div>

      <div class="section-gap">
        <div class="section-title">여행 기간</div>
        <div class="days-row">
          <button class="days-btn" onclick="changeDays(-1)">−</button>
          <div class="days-val"><span id="daysVal">1</span>일</div>
          <button class="days-btn" onclick="changeDays(1)">+</button>
        </div>
      </div>

      <div class="section-gap">
        <div class="section-title">동행 유형</div>
        <div class="chip-group">
          <button class="chip" onclick="toggleChip(this)">혼자</button>
          <button class="chip selected" onclick="toggleChip(this)">커플</button>
          <button class="chip" onclick="toggleChip(this)">친구</button>
          <button class="chip" onclick="toggleChip(this)">가족</button>
        </div>
      </div>

      <div class="section-gap">
        <div class="section-title">예산 수준</div>
        <div class="chip-group">
          <button class="chip" onclick="toggleChip(this)">저예산</button>
          <button class="chip selected" onclick="toggleChip(this)">중간</button>
          <button class="chip" onclick="toggleChip(this)">여유있게</button>
        </div>
      </div>

      <div class="section-gap">
        <div class="section-title">여행 스타일 (복수 선택)</div>
        <div class="chip-group">
          <button class="chip selected" onclick="toggleChip(this)">맛집</button>
          <button class="chip selected" onclick="toggleChip(this)">쇼핑</button>
          <button class="chip" onclick="toggleChip(this)">문화/역사</button>
          <button class="chip" onclick="toggleChip(this)">자연/공원</button>
          <button class="chip" onclick="toggleChip(this)">카페</button>
          <button class="chip" onclick="toggleChip(this)">야경</button>
        </div>
      </div>

      <div class="section-gap">
        <div class="section-title">최적화 기준</div>
        <div class="chip-group">
          <button class="chip selected" onclick="toggleChip(this)">이동 최소화</button>
          <button class="chip" onclick="toggleChip(this)">비용 절약</button>
          <button class="chip" onclick="toggleChip(this)">환승 최소화</button>
          <button class="chip" onclick="toggleChip(this)">짐 편의</button>
        </div>
      </div>

      <div class="section-gap">
        <div class="section-title">현지 출발 거점</div>
        <div class="chip-group" id="localHubChips"></div>
      </div>

      <div class="section-gap">
        <div class="section-title">공항 (선택)</div>
        <div class="chip-group" id="airportChips"></div>
      </div>

      <div class="section-gap">
        <div class="section-title">숙소 (선택)</div>
        <div style="display:flex;gap:6px;">
          <input id="hotelInput" class="search-input" type="text" placeholder="숙소 이름 검색 (예: APA, 하얏트)" style="flex:1;font-size:13px;padding:8px 10px;" onkeydown="if(event.key==='Enter'){event.preventDefault();searchHotel();}">
          <button type="button" class="search-btn" onclick="searchHotel()" style="font-size:12px;">검색</button>
        </div>
        <div id="hotelResults" style="margin-top:6px;display:none;"></div>
        <div id="hotelSelected" style="margin-top:6px;display:none;"></div>
      </div>

      <button type="button" class="cta-btn" onclick="goToPlanner()">추천 동선 생성 →</button>
    </div>
  </div>

  <!-- SCREEN 2: PLANNER -->
  <div class="screen planner-screen" id="screen2">
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="panel-header" style="display:flex;align-items:center;gap:10px;">
        <button type="button" onclick="goBack()" style="flex-shrink:0;width:28px;height:28px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;font-size:14px;color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;">←</button>
        <div style="flex:1;min-width:0;">
          <h2 id="plannerTitle">도쿄 핵심 동선</h2>
          <p id="plannerSub">1일 · 맛집+쇼핑</p>
        </div>
      </div>
      <div class="day-tabs" id="dayTabs"></div>
      <div class="summary-strip">
        <div class="summary-cell"><div class="sv" id="totalTime">148분</div><div class="sl">총 이동</div></div>
        <div class="summary-cell"><div class="sv" id="totalCost">¥1,290</div><div class="sl">교통비</div></div>
        <div class="summary-cell"><div class="sv" id="stopCount">6곳</div><div class="sl">방문지</div></div>
      </div>

      <div class="route-list" id="routeList"></div>

      <div class="add-panel">
        <div class="search-row">
          <input class="search-input" type="text" id="searchInput" placeholder="맛집·카페·쇼핑·숙소·관광지 검색">
          <button class="search-btn" onclick="doSearch()">검색</button>
        </div>
        <div class="search-results" id="searchResults"></div>
        <div id="removedPlaces" style="display:none;margin-top:10px;"></div>
      </div>
    </div>

    <!-- MAP AREA -->
    <div class="map-area">
      <div id="leafletMap"></div>

      <div class="diff-card" id="diffCard">
        <button class="diff-close" onclick="closeDiff()">✕</button>
        <div class="diff-title">장소 추가 후 변경사항</div>
        <div class="diff-row">
          <div class="diff-item">
            <div class="diff-label">총 이동시간</div>
            <div class="diff-vals"><span>135분</span><span class="diff-arrow">→</span><span class="diff-after">148분</span></div>
          </div>
          <div class="diff-item">
            <div class="diff-label">교통비</div>
            <div class="diff-vals"><span>¥1,240</span><span class="diff-arrow">→</span><span class="diff-after">¥1,290</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

function getTokyoStationByName(name) {
  return TOKYO_STATIONS.find(st => st.name === name) || null;
}

function getNearestTokyoStation(place) {
  if (!place) return null;
  let best = null;
  let bestKm = Infinity;
  TOKYO_STATIONS.forEach(st => {
    const km = haversineKm(place, st);
    if (km < bestKm) {
      bestKm = km;
      best = st;
    }
  });
  return bestKm <= 12 ? best : null;
}

function getNearestExitForPlace(stationInfo, place) {
  if (!stationInfo?.exits?.length) return null;
  if (!place) return stationInfo.exits[0];
  let best = stationInfo.exits[0];
  let bestKm = Infinity;
  stationInfo.exits.forEach(exit => {
    const km = haversineKm(place, exit);
    if (km < bestKm) {
      bestKm = km;
      best = exit;
    }
  });
  return best || stationInfo.exits[0];
}

function estimateAccessWalkMinutes(place, stationInfo, exitInfo) {
  if (!place || !stationInfo) return 0;
  const target = exitInfo || stationInfo;
  const km = haversineKm(place, target);
  const normalizedPlace = normalizeTransitText(place.name || '');
  const normalizedStation = normalizeTransitText((stationInfo.name || '').replace(/역/g, ''));

  let mins = Math.max(2, Math.round(km * 13));

  if (normalizedStation && normalizedPlace.includes(normalizedStation)) {
    mins = Math.min(mins, 2);
  }

  if (isAirportPlace(place)) {
    mins = Math.max(6, Math.round(km * 12 + 4));
  }

  if (km < 0.08 && !isAirportPlace(place)) {
    mins = 2;
  }

  return mins;
}

function getTokyoPlaceHint(place) {
  if (!place) return null;
  const hay = normalizeTransitText(`${place.name} ${place.cat || ''}`);
  return TOKYO_PLACE_HINTS.find(h => (h.keywords || []).some(keyword => hay.includes(normalizeTransitText(keyword)))) || null;
}

function getTokyoTransitAccess(place) {
  if (selectedCountry !== '🇯🇵 일본' || selectedCity !== '도쿄' || !place) return null;
  const hint = getTokyoPlaceHint(place);
  const stationInfo = hint ? getTokyoStationByName(hint.station) : getNearestTokyoStation(place);
  if (!stationInfo) return null;
  const exitInfo = hint?.exit
    ? (stationInfo.exits || []).find(exit => exit.name === hint.exit) || getNearestExitForPlace(stationInfo, place)
    : getNearestExitForPlace(stationInfo, place);
  const exitName = exitInfo?.name || '';
  return {
    stationName: stationInfo.name,
    exitName,
    exitInfo,
    label: exitName ? `${stationInfo.name} ${exitName}` : stationInfo.name,
    note: hint?.note || '',
    accessMins: estimateAccessWalkMinutes(place, stationInfo, exitInfo),
    accessKm: haversineKm(place, exitInfo || stationInfo),
  };
}

function formatSegmentCost(cost, sampleCost = '') {
  if (!cost) return '';
  const money = getMoneyConfig(sampleCost || '¥1,000');
  const value = money.multiplier ? Math.round(cost / money.multiplier) : cost;
  return formatMoney(value, money);
}

function getTransitSegmentDetail(fromPlace, toPlace, seg) {
  if (!seg || seg.mode !== 'transit') return null;
  if (!(selectedCountry === '🇯🇵 일본' && selectedCity === '도쿄')) return null;
  const origin = getTokyoTransitAccess(fromPlace);
  const destination = getTokyoTransitAccess(toPlace);
  if (!origin && !destination) return null;
  const note = destination?.note || origin?.note || '';
  const approachMins = origin?.accessMins || 0;
  const arrivalWalkMins = destination?.accessMins || 0;
  return {
    origin,
    destination,
    note,
    approachMins,
    arrivalWalkMins,
    doorToDoorMins: seg.mins + approachMins + arrivalWalkMins,
  };
}

function initMap() {
  if (map) return;
  map = L.map('leafletMap', { zoomControl: true, attributionControl: false });
  // 타일 서버 fallback (OSM → Carto)
  function addTileLayer() {
    const layers = [
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '' }),
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '' }),
      L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', { maxZoom: 18, attribution: '' }),
    ];
    let current = 0;
    function tryNext() {
      if (current > 0) map.removeLayer(layers[current - 1]);
      if (current >= layers.length) return;
      const layer = layers[current++];
      let failed = false;
      layer.on('tileerror', () => { if (!failed) { failed = true; tryNext(); } });
      layer.addTo(map);
    }
    tryNext();
  }
  addTileLayer();
}

async function fetchJsonWithTimeout(url, options = {}, timeout = 7000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.json();
  } finally {
    clearTimeout(timer);
  }
}

function normalizeHotelText(value = '') {
  return String(value || '')
    .normalize('NFKC')
    .replace(/[|｜/,:;()\[\]{}]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function expandHotelNameVariants(name, area, cityName) {
  const base = normalizeHotelText(name);
  const variants = new Set();
  const add = (v) => { v = normalizeHotelText(v); if (v) variants.add(v); };

  add(base);
  add(base.replace(/grand\s*monday/ig, 'GRAND MONday'));
  add(base.replace(/grand\s*monday/ig, 'MONday'));
  add(base.replace(/hotel\s*/ig, ''));
  add(base.replace(/apt/ig, 'apartment'));

  const aliasMap = {
    '上野御徒町': 'Ueno Okachimachi',
    '上野': 'Ueno',
    '御徒町': 'Okachimachi',
    '浅草': 'Asakusa',
    '新宿': 'Shinjuku',
    '渋谷': 'Shibuya',
    '銀座': 'Ginza',
    '池袋': 'Ikebukuro',
    '秋葉原': 'Akihabara',
    '東京駅': 'Tokyo Station',
    '東京': 'Tokyo',
    '大阪': 'Osaka',
    '京都': 'Kyoto',
    '札幌': 'Sapporo',
    '福岡': 'Fukuoka',
    '名古屋': 'Nagoya',
    '那覇': 'Naha',
    '博多': 'Hakata'
  };

  let extractedArea = normalizeHotelText(area);
  for (const [jp, en] of Object.entries(aliasMap)) {
    if (base.includes(jp)) {
      add(base.replaceAll(jp, en));
      add(base.replaceAll(jp, ' ' + en + ' '));
      add(base.replaceAll(jp, '').trim() + ' ' + en);
      if (!extractedArea) extractedArea = en;
    }
  }

  if (extractedArea) {
    add(base + ' ' + extractedArea);
    add(base.replace(/hotel\s*/ig, '').trim() + ' ' + extractedArea);
  }
  if (cityName) add(base + ' ' + cityName);

  return { variants: [...variants], extractedArea };
}

async function geocodeHotelLocation(name, area, cityName, countryName, countryCode, cityCenter) {
  const { variants, extractedArea } = expandHotelNameVariants(name, area, cityName);
  const finalArea = normalizeHotelText(area || extractedArea || '');
  const exactQueries = [];
  const seen = new Set();
  const pushQuery = (parts) => {
    const q = normalizeHotelText(parts.filter(Boolean).join(' '));
    if (q && !seen.has(q)) {
      seen.add(q);
      exactQueries.push(q);
    }
  };

  variants.forEach(v => {
    pushQuery([v, finalArea, cityName, countryName]);
    pushQuery([v, cityName, countryName]);
    pushQuery(['hotel', v, cityName, countryName]);
    pushQuery([v, finalArea, cityName]);
  });

  const hotelTypes = ['hotel','hostel','motel','guest_house','guest house','resort','apartment','apartments','serviced_apartment'];
  const withinReasonableRange = (lat, lng) => {
    if (!cityCenter) return true;
    return haversineKm({ lat, lng }, { lat: cityCenter[0], lng: cityCenter[1] }) <= 80;
  };
  const scoreFeature = (item, label = '') => {
    const type = String(item?.type || item?.properties?.osm_value || item?.properties?.type || '').toLowerCase();
    const text = normalizeHotelText(`${label} ${item?.display_name || ''} ${item?.properties?.name || ''}`).toLowerCase();
    const wanted = normalizeHotelText(name).toLowerCase();
    let score = 0;
    if (hotelTypes.includes(type)) score += 5;
    if (wanted && text.includes(wanted)) score += 4;
    for (const token of wanted.split(' ')) {
      if (token.length >= 2 && text.includes(token)) score += 1;
    }
    if (finalArea && text.includes(finalArea.toLowerCase())) score += 2;
    return score;
  };

  for (const rawQuery of exactQueries) {
    const query = encodeURIComponent(rawQuery);
    try {
      const nominatimUrl = `https://nominatim.openstreetmap.org/search?q=${query}&format=jsonv2&addressdetails=1&limit=8${countryCode ? `&countrycodes=${countryCode}` : ''}`;
      const data = await fetchJsonWithTimeout(nominatimUrl, {
        headers: {
          'Accept-Language': 'ja,ko,en',
          'User-Agent': 'Mozilla/5.0 trip-planner'
        }
      }, 7000);
      const filtered = (data || []).filter(d => withinReasonableRange(parseFloat(d.lat), parseFloat(d.lon)));
      const best = filtered.sort((a, b) => scoreFeature(b, rawQuery) - scoreFeature(a, rawQuery))[0];
      if (best && scoreFeature(best, rawQuery) >= 4) {
        return {
          lat: parseFloat(best.lat),
          lng: parseFloat(best.lon),
          source: 'nominatim',
          label: best.display_name || rawQuery,
          exact: true,
        };
      }
    } catch (e) {}

    try {
      const photonUrl = `https://photon.komoot.io/api/?q=${query}&limit=8&lang=en`;
      const photon = await fetchJsonWithTimeout(photonUrl, {}, 7000);
      const features = (photon?.features || []).filter(f => {
        const coords = f?.geometry?.coordinates || [];
        return coords.length >= 2 && withinReasonableRange(coords[1], coords[0]);
      });
      const bestFeature = features.sort((a, b) => scoreFeature(b, rawQuery) - scoreFeature(a, rawQuery))[0];
      if (bestFeature && scoreFeature(bestFeature, rawQuery) >= 4) {
        const coords = bestFeature.geometry.coordinates;
        return {
          lat: parseFloat(coords[1]),
          lng: parseFloat(coords[0]),
          source: 'photon',
          label: bestFeature?.properties?.name || rawQuery,
          exact: true,
        };
      }
    } catch (e) {}
  }

  if (finalArea) {
    const areaQuery = encodeURIComponent([finalArea, cityName, countryName].filter(Boolean).join(' '));
    try {
      const areaData = await fetchJsonWithTimeout(`https://nominatim.openstreetmap.org/search?q=${areaQuery}&format=jsonv2&addressdetails=1&limit=3${countryCode ? `&countrycodes=${countryCode}` : ''}`, {
        headers: {
          'Accept-Language': 'ja,ko,en',
          'User-Agent': 'Mozilla/5.0 trip-planner'
        }
      }, 7000);
      const areaBest = (areaData || []).find(d => withinReasonableRange(parseFloat(d.lat), parseFloat(d.lon)));
      if (areaBest) {
        return {
          lat: parseFloat(areaBest.lat),
          lng: parseFloat(areaBest.lon),
          source: 'area-fallback',
          label: areaBest.display_name || finalArea,
          exact: false,
        };
      }
    } catch (e) {}
  }

  return null;
}

async function addCustomHotel() {
  const name = document.getElementById('customHotelName').value.trim();
  const area = document.getElementById('customHotelArea').value.trim();
  if (!name) {
    document.getElementById('customHotelName').focus();
    return;
  }

  const btn = document.querySelector('#hotelResults button[onclick="addCustomHotel()"]');
  if (btn) { btn.textContent = '검색 중...'; btn.disabled = true; }

  const countryName = (selectedCountry || '').replace(/^[^ ]+\s*/, '').trim();
  const cityName = selectedCity || '';
  const countryCodeMap = {
    '🇯🇵 일본':'jp', '🇫🇷 프랑스':'fr', '🇬🇧 영국':'gb', '🇹🇭 태국':'th',
    '🇻🇳 베트남':'vn', '🇦🇺 호주':'au', '🇰🇷 한국':'kr'
  };
  const countryCode = countryCodeMap[selectedCountry] || '';
  const cityCenter = DESTINATIONS[selectedCountry]?.cities[selectedCity]?.center || null;

  try {
    const match = await geocodeHotelLocation(name, area, cityName, countryName, countryCode, cityCenter);
    if (match) {
      const cat = area ? `숙소 · ${area}` : (match.exact ? '숙소' : '숙소 · 대략적 위치');
      selectHotel(name, cat, match.lat, match.lng);
      if (!match.exact) {
        showHotelSearchStatus(`정확한 숙소 좌표를 찾지 못해 ${area || cityName} 기준의 대략적 위치로 표시했습니다.`, 'normal');
      }
      return;
    }

    showHotelSearchStatus(`숙소 위치를 찾지 못했습니다. 호텔명만 넣었어도 이름 안의 지역(예: 上野御徒町, Asakusa)을 최대한 읽도록 바꿨지만, 아직 못 찾으면 지역명이나 주소를 함께 넣어 주세요.`, 'error');
  } catch(e) {
    showHotelSearchStatus('숙소 위치 검색 중 오류가 발생했습니다. 잠시 후 다시 시도하거나 지역명을 함께 입력해 주세요.', 'error');
  } finally {
    if (btn) { btn.textContent = '이 숙소로 설정'; btn.disabled = false; }
  }
}

function getDefaultSampleCostForSelection() {
  const byCountry = {
    '🇯🇵 일본': '¥1,000',
    '🇫🇷 프랑스': '€12',
    '🇬🇧 영국': '£10',
    '🇹🇭 태국': '฿220',
    '🇻🇳 베트남': '₫120K',
    '🇦🇺 호주': 'A$14',
  };
  return byCountry[selectedCountry] || '¥1,000';
}

function buildGenericPlansForSelectedCity() {
  const cityMeta = DESTINATIONS[selectedCountry]?.cities?.[selectedCity];
  if (!cityMeta) return CITY_PLANS['도쿄'];

  const center = cityMeta.center || [35.6812, 139.7671];
  const hubs = Array.isArray(cityMeta.hubs) && cityMeta.hubs.length ? cityMeta.hubs : [selectedCity + ' 중심가'];
  const airport = cityMeta.airports?.[0] || null;

  function placeFromHub(name, idx) {
    const latOffset = (idx % 2 === 0 ? 0.012 : -0.010) + idx * 0.002;
    const lngOffset = (idx % 2 === 0 ? 0.010 : -0.012) - idx * 0.0015;
    const cats = ['중심지', '쇼핑/산책', '맛집', '명소', '카페/휴식'];
    const emojis = ['📍', '🛍', '🍽', '🏛', '☕'];
    return {
      name,
      cat: cats[idx % cats.length],
      emoji: emojis[idx % emojis.length],
      lat: Number((center[0] + latOffset).toFixed(6)),
      lng: Number((center[1] + lngOffset).toFixed(6)),
    };
  }

  const hubPlaces = hubs.slice(0, 4).map(placeFromHub);
  const firstPlace = hubPlaces[0] || {
    name: selectedCity + ' 중심가',
    cat: '중심지',
    emoji: '📍',
    lat: center[0],
    lng: center[1],
  };
  const lastPlace = hubPlaces[hubPlaces.length - 1] || firstPlace;

  const airportPlace = airport ? {
    name: airport.short || airport.name,
    cat: '공항',
    emoji: '✈️',
    lat: airport.lat,
    lng: airport.lng,
  } : null;

  const sampleCost = getDefaultSampleCostForSelection();

  const plans = [
    {
      theme: `${selectedCity} 핵심 동선`,
      time: '120분',
      cost: sampleCost,
      places: [firstPlace, ...hubPlaces.slice(1), lastPlace],
      segs: [],
    },
    {
      theme: `${selectedCity} 여유 일정`,
      time: '95분',
      cost: sampleCost,
      places: [
        firstPlace,
        ...hubPlaces.slice(1, 3),
        {
          name: selectedCity + ' 추천 스팟',
          cat: '산책/포토',
          emoji: '🌆',
          lat: Number((center[0] - 0.008).toFixed(6)),
          lng: Number((center[1] + 0.013).toFixed(6)),
        },
        lastPlace,
      ],
      segs: [],
    }
  ].map(plan => ({
    ...plan,
    places: uniquePlacesByKey(plan.places.filter(Boolean).map((place, idx) => ({
      ...place,
      instanceKey: `generic-${selectedCity}-${plan.theme}-${idx}-${place.name}`,
      sourceType: 'generic',
    }))),
  }));

  if (airportPlace) {
    plans.push({
      theme: `${selectedCity} 입출국 일정`,
      time: '140분',
      cost: sampleCost,
      places: uniquePlacesByKey([
        airportPlace,
        firstPlace,
        ...hubPlaces.slice(1, 3),
        lastPlace,
      ].filter(Boolean).map((place, idx) => ({
        ...place,
        instanceKey: `generic-airport-${selectedCity}-${idx}-${place.name}`,
        sourceType: 'generic',
      }))),
      segs: [],
    });
  }

  return plans;
}

function getActivePlans() {
  return CITY_PLANS[selectedCity] || buildGenericPlansForSelectedCity();
}

    departure: { cat: '공항 · 출발', roleLabel: '출발', key: `airport-departure-${dayIdx}` },

function getHotelPlace(role = 'general', dayIdx = activeDay) {

function uniquePlacesByKey(places) {
  const seen = new Set();
  return places.filter(p => {
    const key = p?.instanceKey || p?.name;
    if (!p || !p.name || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function clearExcludedPlaceByName(dayIdx, name) {
  if (!excludedPlaces[dayIdx]) return;
  const fullPlaces = getDayData(dayIdx, { applyExcluded: false, applyOrder: false }).places;
  fullPlaces
    .filter(p => p.name === name)
    .forEach(p => excludedPlaces[dayIdx].delete(p.instanceKey || p.name));
  if (excludedPlaces[dayIdx].size === 0) delete excludedPlaces[dayIdx];
}

function escapeJsAttr(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function haversineKm(a, b) {
  if (!a || !b) return 0;
  const toRad = deg => deg * Math.PI / 180;
  const lat1 = Number(a.lat), lng1 = Number(a.lng);
  const lat2 = Number(b.lat), lng2 = Number(b.lng);
  if ([lat1, lng1, lat2, lng2].some(v => Number.isNaN(v))) return 0;
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  return R * c;
}

function getMoneyConfig(sampleCost = '') {
  const sample = String(sampleCost || '').trim();
  if (sample.startsWith('A$')) return { prefix: 'A$', suffix: '', decimals: 0, base: 4, perKm: 0.38, airportExtra: 6, roundTo: 1 };
  if (sample.startsWith('¥')) return { prefix: '¥', suffix: '', decimals: 0, base: 180, perKm: 18, airportExtra: 260, roundTo: 10 };
  if (sample.startsWith('€')) return { prefix: '€', suffix: '', decimals: 0, base: 2, perKm: 0.7, airportExtra: 3, roundTo: 1 };
  if (sample.startsWith('£')) return { prefix: '£', suffix: '', decimals: 0, base: 3, perKm: 0.22, airportExtra: 3, roundTo: 1 };
  if (sample.startsWith('฿')) return { prefix: '฿', suffix: '', decimals: 0, base: 18, perKm: 3, airportExtra: 30, roundTo: 1 };
  if (sample.startsWith('₫')) return { prefix: '₫', suffix: 'K', decimals: 0, base: 15, perKm: 7, airportExtra: 20, roundTo: 5, multiplier: 1000 };
  return { prefix: '¥', suffix: '', decimals: 0, base: 180, perKm: 18, airportExtra: 260, roundTo: 10 };
}

function roundMoney(value, config) {
  const step = config.roundTo || 1;
  return Math.max(0, Math.round(value / step) * step);
}

function formatMoney(value, config) {
  const safeValue = Math.max(0, value || 0);
  if (config.multiplier) {
    return `${config.prefix}${Math.round(safeValue)}${config.suffix || ''}`;
  }
  const rounded = config.decimals > 0 ? safeValue.toFixed(config.decimals) : Math.round(safeValue).toString();
  return `${config.prefix}${rounded}${config.suffix || ''}`;
}

function isAirportPlace(place) {
  return !!place && String(place.cat || '').includes('공항');
}

function estimateSegment(a, b, sampleCost) {
  const km = haversineKm(a, b);
  if (km <= 0.12) {
    return { mode: 'walk', mins: 3, cost: 0 };
  }

  const airportLeg = isAirportPlace(a) || isAirportPlace(b);
  let mode = km <= 1.4 ? 'walk' : 'transit';

  if (airportLeg && km > 0.8) mode = 'transit';

  if (mode === 'walk') {
    return {
      mode,
      mins: Math.max(5, Math.round(km * 14)),
      cost: 0,
    };
  }

  const money = getMoneyConfig(sampleCost);
  let mins = Math.max(10, Math.round(km * 3.4 + 8));
  if (airportLeg) mins += 12;
  if (km > 25) mins += 8;

  let cost = money.base + km * money.perKm + (airportLeg ? money.airportExtra : 0);
  if (km > 25) cost += km * money.perKm * 0.35;
  if (money.multiplier) {
    cost = roundMoney(cost, money) * money.multiplier;
  } else {
    cost = roundMoney(cost, money);
  }

  return { mode, mins, cost };
}

function buildDynamicMetrics(places, sampleCost) {
  const money = getMoneyConfig(sampleCost);
  const segs = [];
  let totalMins = 0;
  let totalCost = 0;

  for (let i = 0; i < places.length - 1; i++) {
    const seg = estimateSegment(places[i], places[i + 1], sampleCost);
    segs.push(seg);
    totalMins += seg.mins;
    totalCost += seg.cost;
  }

  const costForLabel = money.multiplier ? Math.round(totalCost / money.multiplier) : totalCost;
  return {
    segs,
    time: `${totalMins}분`,
    cost: formatMoney(costForLabel, money),
  };
}

function getDayData(dayIdx, options = {}) {
  const { applyExcluded = true, applyOrder = true } = options;
  const plans = getActivePlans();
  const plan = plans[dayIdx] || plans[dayIdx % plans.length];
  const excluded = excludedPlaces[dayIdx] || new Set();
  const isFirstDay = dayIdx === 0;
  const isLastDay = dayIdx === days - 1;

  const basePlanPlaces = plan.places.map((p, idx) => ({
    ...p,
    instanceKey: p.instanceKey || `base-${dayIdx}-${idx}-${p.name}`,
    sourceType: p.sourceType || 'base',
  }));

  const airportArrival = getAirportPlace('arrival', dayIdx);
  const airportDeparture = getAirportPlace('departure', dayIdx);
  const hotelStart = getHotelPlace('start', dayIdx);
  const hotelEnd = getHotelPlace('end', dayIdx);

  const midBase = basePlanPlaces.slice(1, basePlanPlaces.length - 1);
  const extras = (customPlaces[dayIdx] || []).map((p, idx) => ({
    ...p,
    instanceKey: p.instanceKey || `custom-${dayIdx}-${idx}-${p.name}`,
    sourceType: 'custom',
  }));
  const mid = [...midBase, ...extras];

  let places;
  if (isFirstDay && airportArrival) {
    places = hotelStart
      ? [airportArrival, hotelStart, ...mid, hotelEnd || hotelStart]
      : [airportArrival, ...mid, basePlanPlaces[basePlanPlaces.length - 1]];
  } else if (isLastDay && airportDeparture) {
    places = hotelStart
      ? [hotelStart, ...mid, hotelEnd || hotelStart, airportDeparture]
      : [basePlanPlaces[0], ...mid, airportDeparture];
  } else if (hotelStart) {
    places = [hotelStart, ...mid, hotelEnd || hotelStart];
  } else {
    places = [basePlanPlaces[0], ...mid, basePlanPlaces[basePlanPlaces.length - 1]];
  }

  if (applyExcluded) {
    places = places.filter(p => !excluded.has(p.instanceKey || p.name));
  }

  if (applyOrder && orderOverrides[dayIdx] && places.length > 1) {
    const overrideKeys = orderOverrides[dayIdx].map(p => p.instanceKey || p.name);
    places = [...places].sort((a, b) => {
      const aKey = a.instanceKey || a.name;
      const bKey = b.instanceKey || b.name;
      const ai = overrideKeys.indexOf(aKey);
      const bi = overrideKeys.indexOf(bKey);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
  }

  const metrics = buildDynamicMetrics(places, plan.cost);
  return { ...plan, sampleCost: plan.cost, places, segs: metrics.segs, time: metrics.time, cost: metrics.cost };
}

function getRemovedPlaces(dayIdx) {
  const excluded = excludedPlaces[dayIdx] || new Set();
  if (excluded.size === 0) return [];
  const fullPlaces = getDayData(dayIdx, { applyExcluded: false, applyOrder: false }).places;
  return uniquePlacesByKey(fullPlaces.filter(p => excluded.has(p.instanceKey || p.name)));
}

function renderDayPlan() {
  const data = getDayData(activeDay);

  document.getElementById('totalTime').textContent = data.time;
  document.getElementById('totalCost').textContent = data.cost;
  document.getElementById('stopCount').textContent = data.places.length + '곳';

  renderRoute(data);
  renderRemovedPlaces();
  renderMap(data);
}

function removePlace(instanceKey) {
  const data = getDayData(activeDay);
  if (data.places.length <= 1) return;
  if (!excludedPlaces[activeDay]) excludedPlaces[activeDay] = new Set();
  excludedPlaces[activeDay].add(instanceKey);
  if (orderOverrides[activeDay]) {
    orderOverrides[activeDay] = orderOverrides[activeDay].filter(p => (p.instanceKey || p.name) !== instanceKey);
  }
  activeIdx = null;
  renderDayPlan();
}

function restorePlace(instanceKey) {
  if (!excludedPlaces[activeDay]) return;
  excludedPlaces[activeDay].delete(instanceKey);
  if (excludedPlaces[activeDay].size === 0) delete excludedPlaces[activeDay];
  activeIdx = null;
  renderDayPlan();
}

function renderRemovedPlaces() {
  const el = document.getElementById('removedPlaces');
  if (!el) return;

  const removed = getRemovedPlaces(activeDay);
  if (removed.length === 0) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }

  el.style.display = 'block';
  el.innerHTML = `
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">제거한 일정</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${removed.map(p => `<button onclick="restorePlace('${escapeJsAttr(p.instanceKey || p.name)}')" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:999px;background:var(--color-background-primary);cursor:pointer;font-size:12px;color:var(--color-text-primary);font-family:inherit;">${p.emoji || '📍'} ${p.name} <span style="font-size:11px;color:var(--text2);">(${p.cat})</span> <span style="color:var(--accent);font-weight:700;">＋</span></button>`).join('')}
    </div>
  `;
}

// ── 드래그 상태 ──
let dragSrc = null;

function reorderDayPlaces(fromIdx, toIdx) {
  const cur = getDayData(activeDay).places;
  if (!Array.isArray(cur) || cur.length <= 1) return;
  if (fromIdx === toIdx) return;
  if (fromIdx < 0 || fromIdx >= cur.length) return;
  if (toIdx < 0 || toIdx >= cur.length) return;

  const arr = [...cur];
  const [moved] = arr.splice(fromIdx, 1);
  arr.splice(toIdx, 0, moved);
  orderOverrides[activeDay] = arr;
  activeIdx = toIdx;
  dragSrc = null;
  renderDayPlan();
}

function movePlaceBy(idx, delta) {
  reorderDayPlaces(idx, idx + delta);
}

function renderRoute(data) {
  const list = document.getElementById('routeList');
  list.innerHTML = '';
  data.places.forEach((p, i) => {
    const canMove = data.places.length > 1;
    const canRemove = data.places.length > 1;

    const item = document.createElement('div');
    item.className = 'route-item' + (activeIdx === i ? ' active' : '');
    item.dataset.idx = i;
    if (canMove) {
      item.draggable = true;
      item.addEventListener('dragstart', e => { dragSrc = i; item.style.opacity='0.4'; e.dataTransfer.effectAllowed='move'; });
      item.addEventListener('dragend', () => { item.style.opacity='1'; document.querySelectorAll('.route-item').forEach(el => el.classList.remove('drag-over')); });
      item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; item.classList.add('drag-over'); });
      item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
      item.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrc === null || dragSrc === i) return;
        reorderDayPlaces(dragSrc, i);
      });
    }

    item.innerHTML = `<div class="ri-row">
      ${canMove ? `<div style="cursor:grab;padding:0 4px;color:#ccc;font-size:14px;flex-shrink:0;touch-action:none;" class="drag-handle">⠿</div>` : '<div style="width:12px;flex-shrink:0;"></div>'}
      <div class="ri-num">${i+1}</div>
      <div class="ri-info"><div class="ri-name">${p.name}</div><div class="ri-cat">${p.cat}</div></div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        <div class="mobile-move-controls">
          <button class="mobile-move-btn" ${i === 0 ? 'disabled' : ''} onclick="event.stopPropagation();movePlaceBy(${i}, -1)" title="위로 이동">↑</button>
          <button class="mobile-move-btn" ${i === data.places.length - 1 ? 'disabled' : ''} onclick="event.stopPropagation();movePlaceBy(${i}, 1)" title="아래로 이동">↓</button>
        </div>
        <div class="ri-time">${p.emoji}</div>
        ${canRemove ? `<button onclick="event.stopPropagation();removePlace('${escapeJsAttr(p.instanceKey || p.name)}')" style="width:20px;height:20px;border-radius:50%;border:1px solid #ddd;background:none;cursor:pointer;font-size:12px;color:#999;display:flex;align-items:center;justify-content:center;flex-shrink:0;" title="제외">✕</button>` : ''}
      </div>
    </div>`;
    item.onclick = () => { activeIdx = i; renderRoute(data); };
    list.appendChild(item);

    if (i < data.places.length - 1) {
      const seg = data.segs ? (data.segs[Math.min(i, data.segs.length-1)]) : { mode:'walk', mins:10, cost:0 };
      const segDetail = getTransitSegmentDetail(p, data.places[i+1], seg);
      const segCostLabel = seg.cost > 0 ? ` · ${formatSegmentCost(seg.cost, data.sampleCost || data.cost)}` : '';
      const segRow = document.createElement('div');
      segRow.className = 'segment-row';
      segRow.innerHTML = `<span class="seg-badge ${seg.mode}">${seg.mode === 'transit' ? '전철' : '도보'}</span>
        <span class="seg-text">
          <span>${seg.mins}분${segCostLabel}</span>
          ${segDetail?.origin ? `<span class="seg-subtext">① ${p.name} → ${segDetail.origin.label} 도보 약 ${segDetail.approachMins}분</span>` : ''}
          ${segDetail?.destination ? `<span class="seg-subtext">② ${segDetail.destination.label} → ${data.places[i+1].name} 도보 약 ${segDetail.arrivalWalkMins}분</span>` : ''}
          ${(segDetail?.origin || segDetail?.destination) ? `<span class="seg-subtext">문앞 기준 예상 약 ${segDetail.doorToDoorMins}분</span>` : ''}
          ${segDetail?.note ? `<span class="seg-subtext">${segDetail.note}</span>` : ''}
        </span>`;
      list.appendChild(segRow);
    }
  });
}

function renderMap(data) {
  initMap();

  // 기존 마커/라인 제거
  markersLayer.forEach(m => map.removeLayer(m));
  markersLayer = [];
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }

  const latlngs = data.places.map(p => [p.lat, p.lng]);

  // 라우트 라인
  if (latlngs.length >= 2) {
    routeLine = L.polyline(latlngs, {
      color: '#D85A30', weight: 3, dashArray: '6,5', opacity: 0.8
    }).addTo(map);
  }

  // 마커
  data.places.forEach((p, i) => {
    const isEnd = i === 0 || i === data.places.length - 1;
    const bg = isEnd ? '#D85A30' : '#fff';
    const fg = isEnd ? '#fff' : '#D85A30';
    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${bg};color:${fg};border:2px solid #D85A30;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.18);cursor:pointer;">${i+1}. ${p.name}</div>`,
      iconAnchor: [0, 28]
    });
    const marker = L.marker([p.lat, p.lng], { icon })
      .addTo(map)
      .on('click', () => { activeIdx = i; renderRoute(getDayData(activeDay)); });
    markersLayer.push(marker);
  });

  // 지도 크기 재계산 후 범위 맞춤 (모바일 레이아웃 반영)
  [50, 200, 500].forEach(ms =>
    setTimeout(() => {
      map.invalidateSize();
      if (ms === 500) {
        if (latlngs.length >= 2) {
          map.fitBounds(latlngs, { padding: [36, 36] });
        } else if (latlngs.length === 1) {
          map.setView(latlngs[0], 14);
        }
      }
    }, ms)
  );
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const el = document.getElementById('searchResults');
  el.innerHTML = '';

  // 퍼지 검색: 이름/카테고리/지역 모두 매칭
  let results = q
    ? ALL_PLACES.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.cat.toLowerCase().includes(q) ||
        r.area.toLowerCase().includes(q) ||
        r.type.toLowerCase().includes(q)
      )
    : ALL_PLACES.slice(0, 8);

  if (results.length === 0) {
    el.innerHTML = '<div style="padding:8px 0;font-size:12px;color:var(--text2);">검색 결과가 없어요</div>';
    el.classList.add('open');
    return;
  }

  results.slice(0, 8).forEach(r => {
    const meta = TYPE_META[r.type] || { dot:'#999', emoji:'📍' };
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `<div class="result-dot" style="background:${meta.dot}"></div>
      <div class="ri-info"><div class="ri-name">${r.name}</div><div class="ri-cat">${r.cat} · ${r.area}</div></div>
      <button style="font-size:11px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-primary);font-family:inherit;" onclick="addPlace('${escapeJsAttr(r.name)}','${escapeJsAttr(r.cat)}','${escapeJsAttr(r.type)}',${r.lat},${r.lng})">추가</button>`;
    el.appendChild(item);
  });
  el.classList.add('open');
}

function showDiffCard(beforeData, afterData) {
  const card = document.getElementById('diffCard');
  if (!card || !beforeData || !afterData) return;
  card.innerHTML = `
    <button class="diff-close" onclick="closeDiff()">✕</button>
    <div class="diff-title">장소 추가 후 변경사항</div>
    <div class="diff-row">
      <div class="diff-item">
        <div class="diff-label">총 이동시간</div>
        <div class="diff-vals"><span>${beforeData.time}</span><span class="diff-arrow">→</span><span class="diff-after">${afterData.time}</span></div>
      </div>
      <div class="diff-item">
        <div class="diff-label">교통비</div>
        <div class="diff-vals"><span>${beforeData.cost}</span><span class="diff-arrow">→</span><span class="diff-after">${afterData.cost}</span></div>
      </div>
    </div>
  `;
  card.classList.add('show');
}

function addPlace(name, cat, type, lat, lng) {
  const beforeData = getDayData(activeDay);
  const emoji = (TYPE_META[type] || {}).emoji || '📍';
  if (!customPlaces[activeDay]) customPlaces[activeDay] = [];

  const existsInCustom = customPlaces[activeDay].some(p => p.name === name);
  if (!existsInCustom) {
    const nextIdx = customPlaces[activeDay].length;
    customPlaces[activeDay].push({
      name, cat, emoji, lat, lng, type,
      instanceKey: `custom-${activeDay}-${nextIdx}-${name}`,
      sourceType: 'custom',
    });
  }

  clearExcludedPlaceByName(activeDay, name);

  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('dot2').classList.remove('active');
  document.getElementById('dot3').classList.add('active');

  const afterData = getDayData(activeDay);
  renderDayPlan();
  showDiffCard(beforeData, afterData);
}

function closeDiff() {
  document.getElementById('diffCard').classList.remove('show');
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key === 'Enter') doSearch(); });

// 초기 UI 렌더
renderDestinationUI();
renderOriginAirportUI();
</script>
</body>
</html>
